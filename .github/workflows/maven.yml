name: Java CI with Automated Review

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ] # Trigger khi có PR hướng vào nhánh main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Cấp quyền để bot có thể viết comment vào PR
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # Bước chạy Checkstyle và gửi phản hồi trực tiếp vào dòng code lỗi
    - name: Checkstyle Review
      uses: dbelyaev/action-checkstyle@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        level: warning # Bot sẽ cảnh báo các lỗi format

    - name: Build and Verify
      run: mvn -B clean verify